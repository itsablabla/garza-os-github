name = "replicas-telegram-bridge"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for mapping (chat_id:thread_id) -> replica_id.
# Create with: wrangler kv:namespace create MAP
# Then paste the id below.
[[kv_namespaces]]
binding = "MAP"
id = "e2e3107ab55b4c8ab4bb6a66a3f02329"

# Durable Object that polls /v1/replica/{id}/history every ~2s and surfaces
# thinking + tool_use + claude-result events to Telegram. One DO instance per
# replica id.
[[durable_objects.bindings]]
name = "WATCHER"
class_name = "ReplicaPoller"

[[migrations]]
tag = "v1"
new_classes = ["ReplicaPoller"]

# Secrets (do NOT commit values). Set with:
#   wrangler secret put TG_TOKEN
#   wrangler secret put TG_WEBHOOK_SECRET
#   wrangler secret put REPLICAS_API_KEY
# Non-secret defaults can live in [vars] below.
[vars]
REPLICAS_ORG_ID = "778b1aa3-4327-45a4-9874-c8a3a72df610"
REPLICAS_ENV_ID = "5f06f598-2712-456a-aab1-bb8cbe64ab01"
REPLICAS_API_BASE = "https://api.replicas.dev/v1"
TG_API_BASE = "https://api.telegram.org"
REPLICA_TTL_SECONDS = "604800"
# Default Telegram-spawned replicas to fast model + low thinking. Override
# by setting these to a different value here or via `wrangler secret put`.
REPLICAS_AGENT_OVERRIDE = "claude"
REPLICAS_MODEL_OVERRIDE = "claude-sonnet-4-6"
REPLICAS_THINKING_OVERRIDE = "low"
