app = 'replicas-matrix-pantalaimon'
primary_region = 'den'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8008
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = 'pan_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
