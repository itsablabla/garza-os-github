name = "replicas-matrix-bridge"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Bundle the vendored @matrix-org/olm WASM (~150KB) as a Workers module so
# we can run Olm 1:1 decryption for /sendToDevice m.room_key events. This
# is the live-key-sharing path that lets the bridge keep up with Megolm
# session rotation without manual re-imports.
rules = [
  { type = "CompiledWasm", globs = ["**/olm.wasm"], fallthrough = false },
]

# KV namespace for (matrix-roomId) -> replicaId mapping + idempotency.
# Create with: wrangler kv:namespace create MAP
[[kv_namespaces]]
binding = "MAP"
id = "036b2f9231de4d21bf0cdf120b5b4869"

# R2 bucket for archiving large tool outputs that exceed the rolling-log
# preview cap. Each archive lands as `<sha256>/<basename>`; the public
# r2.dev URL is composed in poller.ts's archiveLargeOutput helper and
# surfaced in the Done frame footer as a `📎 View full output` link.
# Bucket created via `wrangler r2 bucket create replicas-output-archive`
# and made public via `wrangler r2 bucket dev-url enable`.
[[r2_buckets]]
binding = "OUTPUT_ARCHIVE"
bucket_name = "replicas-output-archive"

# Durable Objects: one global MatrixListener for /sync, one ReplicaPoller per replica.
[[durable_objects.bindings]]
name = "WATCHER"
class_name = "ReplicaPoller"

[[durable_objects.bindings]]
name = "LISTENER"
class_name = "MatrixListener"

# Holds the bot device's persistent Olm Account (curve25519 + ed25519 identity
# keys, OTKs) and the live-captured Megolm session keys received via
# /sendToDevice. Single global instance.
[[durable_objects.bindings]]
name = "OLM_VAULT"
class_name = "OlmVault"

[[migrations]]
tag = "v1"
new_classes = ["ReplicaPoller", "MatrixListener"]

[[migrations]]
tag = "v2"
new_classes = ["OlmVault"]

# Cron trigger keeps the listener alive even if no events fire it.
[triggers]
crons = ["*/1 * * * *"]

[vars]
REPLICAS_ORG_ID = "778b1aa3-4327-45a4-9874-c8a3a72df610"
REPLICAS_ENV_ID = "5f06f598-2712-456a-aab1-bb8cbe64ab01"
REPLICAS_API_BASE = "https://api.replicas.dev/v1"
MATRIX_HOMESERVER = "https://matrix-client.matrix.org"
# "0" = no TTL on the room→replicaId mapping; the entry survives as
# long as the replica does. Only explicit cleanup (auto-cut on
# unrecoverable errors, or 404/410 auto-respawn) deletes it. Any
# positive value is honored as a cap.
REPLICA_TTL_SECONDS = "0"
# Default Telegram-spawned replicas to Sonnet medium-thinking; same as
# the Telegram bridge defaults.
REPLICAS_AGENT_OVERRIDE = "claude"
REPLICAS_MODEL_OVERRIDE = "claude-sonnet-4-6"
REPLICAS_THINKING_OVERRIDE = "medium"
# Single-workspace mode. When set, dispatch reuses this replica id for
# rooms whose KV mapping is missing instead of POST /v1/replica. Pinned
# on first message so subsequent messages route via the normal existing
# path. Leave commented (or unset) to keep the per-room auto-spawn
# behavior. Can also be set as a secret with:
#   wrangler secret put DEFAULT_REPLICA_ID
# DEFAULT_REPLICA_ID = "00000000-0000-0000-0000-000000000000"
# Bot device id on matrix.org (the device the MATRIX_ACCESS_TOKEN was minted
# for). Used as the id in the Olm device-key upload + signature subject.
MATRIX_DEVICE_ID = "Ww3fWv0z7s"
# Bot's display name. Used by the plain-text wake-word gate in group
# rooms — when a message body starts with this name (with optional `@`
# prefix, case-insensitive, word boundary), the listener treats it as
# an explicit mention even if the client didn't attach `m.mentions`
# metadata. Matches Beeper Desktop's normal send shape.
MATRIX_DISPLAY_NAME = "Jada"
# Subscription-plan quotas for the 🪙 row in the status pane subtitle.
# Defaults are mid-range estimates for Claude Max $200 (~250–1000 Sonnet
# messages × ~10k tok/msg per 5h window; ~480–960 hrs/wk × ~115k tok/hr
# for the weekly view). Override to match your actual plan; set to "0" to
# hide a window. Values are total token budgets in absolute tokens.
USAGE_QUOTA_5H_TOK = "5000000"
USAGE_QUOTA_7D_TOK = "100000000"

# Secrets (set via `wrangler secret put`):
#   MATRIX_ACCESS_TOKEN  — `syt_…` from Beeper Desktop → Settings → Help & About → Show access token
#   MATRIX_USER_ID       — e.g. `@replicas-bot:beeper.com`
#   REPLICAS_API_KEY     — same key the Telegram bridge uses
